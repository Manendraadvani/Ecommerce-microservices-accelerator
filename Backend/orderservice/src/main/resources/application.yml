server:
  # Render dynamically assigns a port; locally it uses 1114
  port: ${PORT:1114}

spring:
  application:
    name: orderservice
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
      jakarta:
        persistence:
          sharedCache:
            mode: NONE
    hibernate:
      ddl-auto: update

  datasource:
    # Uses DATABASE_URL from Render/Supabase, or falls back to your local DB
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/springbootmicroservicesjwtorder}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 2        # Max 2 connections per service
      minimum-idle: 1             # Keep only 1 idle connection
      connection-timeout: 30000   # 30s timeout
      idle-timeout: 600000        # Release idle after 10min
      max-lifetime: 1800000 

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

eureka:
  instance:
    # Required for services to find each other on Render's internal network
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10      # heartbeat every 10s
    lease-expiration-duration-in-seconds: 30
  client:
    registry-fetch-interval-seconds: 10
    serviceUrl:
      # Points to your deployed Eureka server or local fallback
      defaultZone: ${EUREKA_SERVICE_URL:http://localhost:8761/eureka/}

stripe:
  secret-key: ${STRIPE_SECRET_KEY}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET}
  payment:
    # Uses the dynamic return URL from Render, or falls back to your local Vite server
    return-url: ${PAYMENT_RETURN_URL:http://localhost:5173/payment-return}

logging:
  level:
    root: INFO