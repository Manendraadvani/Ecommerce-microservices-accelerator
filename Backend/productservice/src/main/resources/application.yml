spring:
  application:
    name: productservice
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
      jakarta:
        persistence:
          sharedCache:
            mode: NONE
    hibernate:
      ddl-auto: update

  datasource:
    # Uses Render/Supabase variables, or defaults to localhost
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/springbootmicroservicesjwtproduct}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 2        # Max 2 connections per service
      minimum-idle: 1             # Keep only 1 idle connection
      connection-timeout: 30000   # 30s timeout
      idle-timeout: 600000        # Release idle after 10min
      max-lifetime: 1800000 
  
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: false

eureka:
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10      # heartbeat every 10s
    lease-expiration-duration-in-seconds: 30
  client:
    registry-fetch-interval-seconds: 10
    serviceUrl:
      defaultZone: ${EUREKA_SERVICE_URL:http://localhost:8761/eureka/}

server:
  # Render automatically sets the PORT variable; locally it uses 1111
  port: ${PORT:1111}

logging:
  level:
    root: INFO