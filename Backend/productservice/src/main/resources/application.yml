spring:
  application:
    name: productservice

  datasource:
    # Uses Render/Supabase variables, or defaults to localhost
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/springbootmicroservicesjwtproduct}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: false

eureka:
  client:
    serviceUrl:
      # Uses EUREKA_SERVICE_URL from Render, or defaults to your local Eureka
      defaultZone: ${EUREKA_SERVICE_URL:http://localhost:8761/eureka/}

server:
  # Render automatically sets the PORT variable; locally it uses 1111
  port: ${PORT:1111}

logging:
  level:
    root: INFO