server:
  # Render dynamically assigns a port; locally it uses 1110
  port: ${PORT:1110}

spring:
  application:
    name: apigateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      httpclient:
        connect-timeout: 60000
        response-timeout: 60s
      
      routes:
        - id: product-service
          uri: lb://PRODUCTSERVICE
          predicates:
            - Path=/api/v1/products/**
          
      globalcors:
        cors-configurations:
          '[/**]':
            # Allows your local React/Vite dev server AND your future deployed frontend URL
            allowedOrigins: 
              - "http://localhost:5173"
              - "${FRONTEND_URL:https://your-frontend-link.onrender.com}"
            allowedMethods:
              - "GET"
              - "POST"
              - "PUT"
              - "DELETE"
              - "OPTIONS"
              - "PATCH"
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

eureka:
  instance:
    # Essential for microservices to find each other on Render's internal network
    prefer-ip-address: true
  client:
    serviceUrl:
      # Points to your deployed Eureka server or local fallback
      defaultZone: ${EUREKA_SERVICE_URL:http://localhost:8761/eureka/}

logging:
  level:
    root: INFO