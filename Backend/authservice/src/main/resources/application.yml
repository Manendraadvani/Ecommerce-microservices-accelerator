spring:
  application:
    name: authservice
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/springbootmicroservicesjwtauth}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: -1  # wait up to 60s for first connection
      maximum-pool-size: 2
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 120000
      max-lifetime: 180000
      keepalive-time: 60000
      connection-test-query: SELECT 1
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
      jakarta:
        persistence:
          sharedCache:
            mode: NONE

server:
  # Render dynamically assigns a port; locally it uses 1112
  port: ${PORT:1112}

eureka:
  instance:
    lease-renewal-interval-in-seconds: 10      # heartbeat every 10s
    lease-expiration-duration-in-seconds: 30
    # Critical for Render: ensures services use internal IPs to find each other
    prefer-ip-address: true
  client:
    registry-fetch-interval-seconds: 10  
    serviceUrl:
      # Points to your deployed Eureka server or local fallback
      defaultZone: ${EUREKA_SERVICE_URL:http://localhost:8761/eureka/}

logging:
  level:
    root: INFO