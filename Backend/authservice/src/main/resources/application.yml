spring:
  application:
    name: authservice
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/springbootmicroservicesjwtauth}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 2        # Max 2 connections per service
      minimum-idle: 1             # Keep only 1 idle connection
      connection-timeout: 30000   # 30s timeout
      idle-timeout: 600000        # Release idle after 10min
      max-lifetime: 1800000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
      jakarta:
        persistence:
          sharedCache:
            mode: NONE

server:
  # Render dynamically assigns a port; locally it uses 1112
  port: ${PORT:1112}

eureka:
  instance:
    lease-renewal-interval-in-seconds: 10      # heartbeat every 10s
    lease-expiration-duration-in-seconds: 30
    # Critical for Render: ensures services use internal IPs to find each other
    prefer-ip-address: true
  client:
    registry-fetch-interval-seconds: 10  
    serviceUrl:
      # Points to your deployed Eureka server or local fallback
      defaultZone: ${EUREKA_SERVICE_URL:http://localhost:8761/eureka/}

logging:
  level:
    root: INFO