spring:
  application:
    name: authservice
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/springbootmicroservicesjwtauth}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
    hikari:
    maximum-pool-size: 2
    minimum-idle: 1
    connection-timeout: 30000
    idle-timeout: 120000        # 2 min — was 600000 (10 min)
    max-lifetime: 180000        # 3 min — was 1800000 (30 min)
    keepalive-time: 60000       # ping Supabase every 1 min to keep connection alive
    connection-test-query: SELECT 1
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
      jakarta:
        persistence:
          sharedCache:
            mode: NONE

server:
  # Render dynamically assigns a port; locally it uses 1112
  port: ${PORT:1112}

eureka:
  instance:
    lease-renewal-interval-in-seconds: 10      # heartbeat every 10s
    lease-expiration-duration-in-seconds: 30
    # Critical for Render: ensures services use internal IPs to find each other
    prefer-ip-address: true
  client:
    registry-fetch-interval-seconds: 10  
    serviceUrl:
      # Points to your deployed Eureka server or local fallback
      defaultZone: ${EUREKA_SERVICE_URL:http://localhost:8761/eureka/}

logging:
  level:
    root: INFO