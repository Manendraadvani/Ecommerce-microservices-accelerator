spring:
  application:
    name: userservice

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/springbootmicroservicesjwtuser}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
    hikari:
    maximum-pool-size: 2
    minimum-idle: 1
    connection-timeout: 30000
    idle-timeout: 120000        # 2 min — was 600000 (10 min)
    max-lifetime: 180000        # 3 min — was 1800000 (30 min)
    keepalive-time: 60000       # ping Supabase every 1 min to keep connection alive
    connection-test-query: SELECT 1

  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: false

eureka:
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
  client:
    registry-fetch-interval-seconds: 10
    serviceUrl:
      defaultZone: ${EUREKA_SERVICE_URL:http://localhost:8761/eureka/}

server:
  port: ${PORT:1113}

logging:
  level:
    root: INFO